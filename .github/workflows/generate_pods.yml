name: Generate New Pods (LLM)

on:
  schedule:
    # Every Sunday at 6 PM PT (Monday 01:00 UTC) — before the trading week
    - cron: '0 1 * * 1'

  # Manual trigger
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch headlines and generate pod
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 -c "
          import os, sys, json, yaml
          from datetime import date, timedelta
          from pathlib import Path

          sys.path.insert(0, 'src')

          # Fetch top financial headlines via free API
          import requests
          try:
              # Use Google News RSS as headline source
              resp = requests.get(
                  'https://news.google.com/rss/search?q=stock+market+economy+when:7d&hl=en-US&gl=US&ceid=US:en',
                  timeout=15,
                  headers={'User-Agent': 'Mozilla/5.0'}
              )
              import xml.etree.ElementTree as ET
              root = ET.fromstring(resp.text)
              headlines = []
              for item in root.findall('.//item')[:20]:
                  title = item.find('title')
                  if title is not None and title.text:
                      headlines.append(title.text)
              print(f'Fetched {len(headlines)} headlines')
              for h in headlines[:5]:
                  print(f'  - {h}')
          except Exception as e:
              print(f'Headline fetch failed: {e}')
              # Fallback headlines
              headlines = [
                  'Market volatility increases amid trade uncertainty',
                  'Fed officials signal cautious approach to rate changes',
                  'AI spending continues to accelerate across hyperscalers',
                  'Consumer confidence diverges by income bracket',
                  'Defense budgets expand as geopolitical tensions rise',
              ]

          # Generate pod via Claude
          from pod_generator import generate_pod_from_news
          try:
              pod = generate_pod_from_news(headlines)
              if pod is None:
                  print('LLM returned no pod')
                  sys.exit(0)

              print(f'Generated pod: {pod.name} ({pod.pod_id})')
              print(f'  Long: {[t[\"ticker\"] for t in pod.long_tickers]}')
              print(f'  Short: {[t[\"ticker\"] for t in pod.short_tickers]}')

              # Write as YAML pod file
              pod_dir = Path('config/pods')
              # Find next available number
              existing = sorted(pod_dir.glob('*.yaml'))
              next_num = len(existing) + 1

              pod_yaml = {
                  'pod_id': pod.pod_id,
                  'name': pod.name,
                  'status': 'ACTIVE',
                  'created_date': date.today().isoformat(),
                  'source': 'llm_generated',
                  'expires': pod.expiry_date,
                  'thesis': {
                      'core': pod.thesis_core,
                      'long': pod.thesis_long,
                      'short': pod.thesis_short,
                      'last_validated': date.today().isoformat(),
                      'confidence': pod.confidence,
                      'invalidation_triggers': ['LLM-generated — review weekly'],
                  },
                  'watch_events': [
                      {'event': 'Auto-generated catalyst', 'expected': 'ongoing', 'status': 'active',
                       'impact': pod.thesis_core[:100], 'notes': 'Generated by Claude API'},
                  ],
                  'evolution_log': [
                      {'date': date.today().isoformat(), 'note': f'Pod auto-generated from {len(headlines)} news headlines'},
                  ],
                  'watchlist': {
                      'long': [{'ticker': t['ticker'], 'name': t['name'], 'thesis': t['thesis'],
                                'status': 'active', 'added': date.today().isoformat()}
                               for t in pod.long_tickers],
                      'short': [{'ticker': t['ticker'], 'name': t['name'], 'thesis': t['thesis'],
                                 'status': 'active', 'added': date.today().isoformat()}
                                for t in pod.short_tickers],
                  },
                  'pairs': {
                      'hints': pod.pair_hints if pod.pair_hints else [],
                      'spread_params': {
                          'lean_allowed': True,
                          'max_lean_ratio': 0.55,
                      },
                  },
              }

              filename = f'{next_num:02d}_{pod.pod_id}.yaml'
              filepath = pod_dir / filename
              with open(filepath, 'w') as f:
                  yaml.dump(pod_yaml, f, default_flow_style=False, sort_keys=False, allow_unicode=True)
              print(f'Written to {filepath}')

          except Exception as e:
              print(f'Pod generation failed: {e}')
              import traceback
              traceback.print_exc()
              sys.exit(1)
          "

      - name: Commit new pod
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/pods/*.yaml
          if git diff --staged --quiet; then
            echo "No new pods to commit"
          else
            git commit -m "Auto-generate new thematic pod from weekly news scan

          Generated by Claude API from financial news headlines.
          Review and adjust confidence/tickers as needed.

          Co-Authored-By: Claude API <noreply@anthropic.com>"
            git push
            echo "New pod committed and pushed"
          fi
