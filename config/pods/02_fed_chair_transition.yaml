pod_id: fed_chair_transition
name: "The Fed Chair Transition"
status: ACTIVE
created_date: "2026-03-29"

thesis:
  core: >
    The Fed leadership transition is a binary event with massive rate
    implications. Warsh confirmation = dovish repricing. Prolonged uncertainty
    = rates stay elevated. Either outcome creates a spread between regional
    banks (NIM expansion either way) and mortgage originators (need rate cuts
    for volume). Same rate sensitivity, opposite positioning.
  long: >
    Regional banks with asset-sensitive balance sheets. NIM expands whether
    cuts come (steepening curve) or don't (higher short rates). Deposit
    franchises provide funding advantage. Win either outcome.
  short: >
    Mortgage originators and rate-dependent fintechs already priced for a
    rate cut boom. Volume-dependent models need a refi wave that may not
    come. If cuts delayed or uncertainty persists, valuation compression.
  last_validated: "2026-03-29"
  confidence: high

  invalidation_triggers:
    - "Warsh withdraws nomination or alternative nominee named"
    - "Fed signals rates on hold regardless of chair outcome"
    - "Inflation re-accelerates, making rate cuts impossible near-term"
    - "Regional bank NIM compresses despite rate environment (deposit competition)"
    - "Mortgage volumes surge without rate cuts (invalidates short thesis)"

