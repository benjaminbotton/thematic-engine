thesis:
  core: Market inflation fears are running ahead of economic reality, creating a bifurcated
    environment where inflation-sensitive sectors face pressure while inflation-resistant/beneficiary
    sectors rally despite moderating actual inflation data.
  long: Companies with pricing power, fixed-rate debt benefits, or inflation-hedged
    revenue streams will outperform as markets overreact to inflation fears while
    actual inflation moderates, creating valuation dislocations favoring businesses
    that can maintain margins and benefit from rate environment changes.
  short: Interest-sensitive and inflation-vulnerable sectors will underperform as
    markets price in persistent inflation concerns, pressuring companies with variable
    costs, rate-sensitive business models, and margin compression risks even as underlying
    inflation trends may be more benign.
