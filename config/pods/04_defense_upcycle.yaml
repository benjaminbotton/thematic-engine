pod_id: defense_upcycle
name: "Defense Spending Secular Upcycle"
status: ACTIVE
created_date: "2026-03-29"

thesis:
  core: >
    Defense is in a multi-year secular upcycle driven by geopolitical
    instability. The edge isn't in large primes (well-covered) but in their
    supply chain — sub-tier suppliers, munitions specialists, military IT.
    This pod trades the backlog visibility vs. backlog cliff spread.
  long: >
    Mid-cap defense sub-tier suppliers with growing backlogs: components,
    subsystems, munitions, drone/autonomous systems, military cyber. Order
    books stretching years out.
  short: >
    Defense companies with disclosed backlog cliffs, expiring contracts
    without replacement, or commercial aerospace exposure that gets
    crowded out by defense prioritization.
  last_validated: "2026-03-29"
  confidence: high

  invalidation_triggers:
    - "Major geopolitical de-escalation (comprehensive peace deals)"
    - "US defense budget gets cut meaningfully"
    - "NATO defense commitment rollback"
    - "Defense sub-tier suppliers hit capacity constraints that compress margins"

watch_events:
  - event: "US defense budget / appropriations"
    expected: "ongoing"
    status: active
    impact: "Budget size and allocation drives sub-tier order flow"
    notes: "Watch for continuing resolutions vs. full appropriations"

  - event: "NATO summits and European defense procurement"
    expected: "ongoing"
    status: active
    impact: "European defense spending = incremental demand for US suppliers"
    notes: ""

  - event: "Geopolitical flashpoints"
    expected: "ongoing"
    status: active
    impact: "Iran, China-Taiwan, Ukraine — escalation = urgency = spending"
    notes: "Binary events. Monitor daily."

  - event: "Defense earnings / backlog disclosures"
    expected: "quarterly"
    status: active
    impact: "Confirms growing vs. declining backlogs. Key for long/short selection."
    notes: "Pay attention to book-to-bill ratios in earnings calls"

  - event: "Contract award announcements"
    expected: "ongoing"
    status: active
    impact: "Recompete wins/losses directly affect short thesis names"
    notes: ""

evolution_log:
  - date: "2026-03-29"
    note: "Pod created. Defense + gold were 2025 standout performers. Secular trend intact."

