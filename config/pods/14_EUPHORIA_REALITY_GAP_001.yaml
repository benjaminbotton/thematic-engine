thesis:
  core: Record stock market highs are masking underlying economic stress signals (recession
    indicators triggering, 2/3 Americans cutting spending, oil shock concerns, Fed
    warnings) creating a bifurcated market where defensive value plays outperform
    vulnerable growth momentum stocks as reality reasserts itself.
  long: Defensive sectors and value stocks with strong fundamentals will outperform
    as economic headwinds materialize. These companies benefit from flight-to-quality
    dynamics, reasonable valuations providing downside protection, and business models
    that perform well during economic stress. Consumer staples, utilities, healthcare,
    and financial services with strong balance sheets should see relative outperformance.
  short: High-multiple growth stocks and speculative plays are vulnerable to multiple
    compression as economic reality catches up to market euphoria. These companies
    face headwinds from reduced consumer spending, higher cost of capital, and valuation
    corrections as investors reassess risk. Technology, discretionary consumer, and
    momentum names trading at premium valuations are most at risk.
