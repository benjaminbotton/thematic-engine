pod_id: ai_infra_vs_hype
name: "AI Infrastructure vs. AI Hype"
status: ACTIVE
created_date: "2026-03-29"

thesis:
  core: >
    The AI trade is bifurcating. Physical infrastructure (power, cooling, data
    centers) has real revenue and multi-year order books. Application-layer AI
    is mostly narrative with no profitability. Each earnings cycle widens or
    narrows this gap — the pod trades the spread.
  long: >
    Picks-and-shovels: power infrastructure, cooling, data center REITs,
    electrical contractors. Revenue is real and growing regardless of which
    AI models win.
  short: >
    AI-washing: application-layer companies burning cash, companies that pivoted
    to AI for valuation but have no AI revenue, and extreme-multiple names where
    >50% of valuation is narrative.
  last_validated: "2026-03-29"
  confidence: high

  invalidation_triggers:
    - "Hyperscaler capex slows materially (multiple quarters of declining spend)"
    - "Application-layer AI companies start showing real recurring revenue"
    - "Power/cooling infrastructure hits supply glut or order cancellations"
    - "Broad AI sentiment crash takes down infra names alongside hype names"

watch_events:
  - event: "Hyperscaler capex announcements"
    expected: "ongoing"
    status: active
    impact: "Confirms or denies the infrastructure demand thesis"
    notes: "Watch MSFT, GOOGL, AMZN, META quarterly capex guidance"

  - event: "Earnings season — infra vs. app divergence"
    expected: "quarterly"
    status: active
    impact: "Each cycle either confirms the spread or signals convergence"
    notes: "Key: do AI app companies start showing revenue, or keep burning?"

  - event: "AI profitability inflection"
    expected: "2026-H2"
    status: upcoming
    impact: "If early AI investments show returns, short thesis weakens. If not, accelerates."
    notes: "This is the big one. Monitor closely mid-year."

  - event: "Power grid bottlenecks / permitting"
    expected: "ongoing"
    status: active
    impact: "Grid constraints = pricing power for infra names, delays for data center buildout"
    notes: ""

evolution_log:
  - date: "2026-03-29"
    note: "Pod created. AI capex >$500B projected. Infra revenue real, app-layer mostly narrative."

