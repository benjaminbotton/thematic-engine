thesis:
  core: Rising bond yields are creating a fundamental shift in asset allocation dynamics,
    benefiting financial institutions that earn from higher rates while pressuring
    high-multiple growth stocks and rate-sensitive sectors that depend on cheap capital.
  long: Banks, insurers, and financial services companies benefit directly from rising
    yields through improved net interest margins, higher investment income, and reduced
    present value of liabilities. These sectors have been undervalued during the low-rate
    environment and now face a structural tailwind.
  short: High-growth technology stocks, REITs, and utilities face fundamental headwinds
    as rising yields increase discount rates for future cash flows, compress multiples,
    and create competition from risk-free alternatives. These rate-sensitive sectors
    are particularly vulnerable after extended valuations built on zero-rate assumptions.
