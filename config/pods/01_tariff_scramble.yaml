pod_id: tariff_scramble
name: "The Tariff Regime Scramble"
status: ACTIVE
created_date: "2026-03-29"

# --- THESIS (living document — update as events unfold) ---

thesis:
  core: >
    Post-IEEPA tariff unwinding is creating asymmetric winners and losers.
    Importers get refunds + margin relief. Domestic producers lose protection.
    The regime is still in flux — new Section 301 actions could re-scramble.
  long: >
    Import-heavy companies owed IEEPA tariff refunds see one-time earnings
    windfalls. Input cost declines as protection erodes expand margins.
  short: >
    Domestic producers who benefited from tariff protection face renewed import
    competition. Margin compression as cheaper imports return.
  last_validated: "2026-03-29"
  confidence: high  # high / medium / low / stale

  # What would KILL this thesis? If any of these become true, reassess.
  invalidation_triggers:
    - "New broad-based tariff regime replaces Section 122 before expiry"
    - "CBP announces indefinite delay on refund processing"
    - "Bipartisan legislation reinstates IEEPA-level protection"
    - "Domestic steel/aluminum prices collapse independently of imports"

# --- WATCH EVENTS (not rigid dates — living awareness markers) ---

watch_events:
  - event: "Section 122 tariff expiry"
    expected: "2026-07-24"
    status: upcoming        # upcoming / active / resolved / invalidated
    impact: "Protection cliff for domestic producers. Key short catalyst."
    notes: ""

  - event: "Section 301 investigation findings"
    expected: "2026-Q2-Q3"
    status: active
    impact: "Could re-impose targeted tariffs on specific goods/countries"
    notes: "Monitor USTR announcements. Could flip some longs to shorts."

  - event: "CBP refund processing ramp"
    expected: "rolling"
    status: active
    impact: "~$650M/month accruing systemwide. Individual company windfalls."
    notes: "Track which companies disclose refund amounts in earnings/10-Qs."

  - event: "Earnings season — refund disclosures"
    expected: "quarterly"
    status: active
    impact: "Companies disclosing actual refund $ = catalyst confirmation"
    notes: ""

