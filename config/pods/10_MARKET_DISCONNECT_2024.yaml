  core: Record-high stock markets are increasingly detached from underlying economic
    fundamentals, creating a divergence between companies benefiting from market exuberance
    versus those exposed to real economic conditions.
  long: Companies that benefit from elevated market conditions, financial speculation,
    and investor euphoria will outperform as markets remain disconnected from reality.
