pod_id: k_shaped_consumer
name: "The K-Shaped Consumer"
status: ACTIVE
created_date: "2026-03-29"

thesis:
  core: >
    The consumer economy is splitting. Affluent consumers benefit from asset
    appreciation and OBBBA tax windfalls. Lower-income consumers are crushed
    by cumulative inflation and tariff-driven goods prices. This pod trades
    the widening spread between luxury and discount.
  long: >
    Luxury/premium consumer discretionary, experiential spending, wealth
    management platforms, premium home improvement. Affluent customer base
    with rising disposable income.
  short: >
    Dollar stores, subprime consumer finance (BNPL, subprime auto), low-end
    dining. Core customer under maximum financial stress with rising
    delinquencies.
  last_validated: "2026-03-29"
  confidence: high

  invalidation_triggers:
    - "Consumer confidence rebounds broadly across income quintiles"
    - "Inflation drops sharply, relieving low-income pressure"
    - "Stock market correction hits affluent spending"
    - "OBBBA provisions get clawed back or modified"
    - "Subprime delinquency rates stabilize or improve"

watch_events:
  - event: "Tax refund season — OBBBA impact"
    expected: "2026-04 through 2026-05"
    status: upcoming
    impact: "Super-sized refunds for high earners = spending surge in luxury"
    notes: "Track IRS refund data releases, luxury retailer same-store sales"

  - event: "Monthly retail sales data"
    expected: "monthly"
    status: active
    impact: "Shows mix shift between premium and discount channels"
    notes: ""

  - event: "Consumer confidence reports"
    expected: "monthly"
    status: active
    impact: "Divergence between high/low income confidence = thesis confirmation"
    notes: "University of Michigan, Conference Board"

  - event: "Consumer discretionary earnings"
    expected: "quarterly"
    status: active
    impact: "Reveals actual traffic/spend patterns by income segment"
    notes: "Compare luxury vs. dollar store same-store comps"

  - event: "Subprime delinquency data"
    expected: "monthly/quarterly"
    status: active
    impact: "Rising delinquencies confirm short thesis on BNPL/subprime auto"
    notes: "Fed consumer credit data, ABS performance reports"

evolution_log:
  - date: "2026-03-29"
    note: "Pod created. CPI +24% since Jan 2021. K-shape widening. OBBBA refunds hitting in spring."

